events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Все запросы, начинающиеся с /api/ или /swagger/ идут в контейнер 'api'
        location ~ ^/(api|swagger)/ {
            proxy_pass http://api:8080; # Обращаемся к бэкенду по имени сервиса из docker-compose
            
            # Стандартные заголовки для правильной работы .NET за прокси
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Маршрутизация для Фронтенда
        location / {
            # Когда добавишь контейнер с фронтом (например, react/vue), 
            # раскомментируешь строку ниже и удалишь return:
            # proxy_pass http://frontend:80; 
            
            return 200 '<html><body><h1>Frontend is not ready yet</h1><p>But Nginx is routing perfectly!</p></body></html>';
            add_header Content-Type text/html;
        }
    }
}